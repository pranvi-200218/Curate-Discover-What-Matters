<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curate — Discover What Matters</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
</head>

<body>

    <div class="grain"></div>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <header>
        <div class="logo">
            <span class="logo-mark">✦</span>
            <span class="logo-text">Curate</span>
        </div>
        <p class="tagline">knowledge, refined</p>
    </header>

    <main>
        <section class="hero">
            <h1 class="headline">
                <span class="line-1">Find the</span>
                <em class="line-2">best resources</em>
                <span class="line-3">worth your time</span>
            </h1>
            <p class="subline">YouTube videos &amp; GitHub repositories — surfaced, ranked &amp; ready.</p>

            <div class="search-wrapper">
                <div class="search-box">
                    <span class="search-icon">⌕</span>
                    <input type="text" id="query" placeholder="e.g. machine learning, web design, rust…" autocomplete="off" />
                    <button class="search-btn" onclick="search()">
            <span>Search</span>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
                </div>
            </div>
        </section>

        <section class="controls">
            <p id="status" class="status-text"></p>
            <div class="toggles">
                <button id="btn-all" class="active" onclick="setFilter('all')">All Results</button>
                <button id="btn-yt" onclick="setFilter('yt')">▶&nbsp; YouTube</button>
                <button id="btn-gh" onclick="setFilter('gh')">◈&nbsp; GitHub</button>
                <button id="btn-bm" onclick="setFilter('bm')">✦&nbsp; Bookmarks</button>
            </div>
        </section>

        <section id="results" class="results-grid"></section>
    </main>

    <footer>
        <div class="footer-inner">
            <span class="footer-mark">✦</span>
            <p>Curate &mdash; Crafted with intention &copy; 2025</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
